<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark background circle -->
  <rect width="32" height="32" rx="6" fill="#111827"/>
  <!-- factory building: main body -->
  <rect x="4" y="16" width="24" height="12" rx="1" fill="#f59e0b"/>
  <!-- factory roof / upper section -->
  <rect x="8" y="12" width="16" height="5" rx="1" fill="#d97706"/>
  <!-- chimney left -->
  <rect x="6" y="6" width="4" height="10" rx="1" fill="#d97706"/>
  <!-- chimney right -->
  <rect x="14" y="8" width="4" height="8" rx="1" fill="#d97706"/>
  <!-- smoke puff left -->
  <circle cx="8" cy="5" r="2" fill="#6b7280" opacity=".7"/>
  <!-- smoke puff right -->
  <circle cx="16" cy="7" r="2" fill="#6b7280" opacity=".7"/>
  <!-- door -->
  <rect x="13" y="22" width="6" height="6" rx="1" fill="#111827"/>
  <!-- window left -->
  <rect x="6" y="20" width="5" height="4" rx="0.5" fill="#111827"/>
  <!-- window right -->
  <rect x="21" y="20" width="5" height="4" rx="0.5" fill="#111827"/>
</svg>
